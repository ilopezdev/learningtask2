<html>
	<head>
		<title>..: Lists :..</title>
		<style type="text/css">
			body {
				background-color: #cccccc;
				font-family: verdana;
				color: #784E46;
			}
			h1 {
				font-family: "Times new roman";
				color: #889665
			}
			ol {
				background-color: #58549C;
				color: #FFFFFF;
			}
			ul {
				background-color: #D67547;
				color: #FFFFFF;
			}
		</style>
	</head>
	<body>
		<h1>HTML list</h1>
		<p>
			Ordered list are list that is in 
			a particular order.
		</p>
		<ol>
			<li>President</li>
			<li>Vice president</li>
			<li>Governor</li>
			<li>Vice governor</li>
			<li>Mayor</li>
			<li>Vice mayor</li>
		</ol>
		<p>
			Unordered list are list that is NOT in 
			a particular order.
		</p>
		<ul>
			<li>Banana</li>
			<li>Grapes</li>
			<li>Guava</li>
			<li>Apple</li>
			<li>Strawberry</li>			
		</ul>
	</body>
</html>
